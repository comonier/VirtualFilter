# ==========================================================
#             VirtualFilter - Configuracao v1.6
# ==========================================================

# Idioma padrao do servidor (en/pt)
language: en

# Tipo de armazenamento (SQLITE)
storage-type: SQLITE

# --- Configuracoes de Slots ---
# Slots iniciais para jogadores sem permissoes especificas
default-slots:
  abf: 1
  isf: 1
  asf: 1

# --- Configuracoes de Automacao ---
# Define se o AutoLoot (AL) vem ativado para novos jogadores
default-autoloot-enabled: false

# Define se o AutoFillHand (Reposicao de itens na mao) vem ativado
default-autofill-enabled: true

# --- Protecao e Seguranca ---
# Tempo em segundos que um item fica protegido para o dono (Mineracao/Mobs)
# Apos esse tempo, qualquer jogador pode coletar.
loot-protection-seconds: 10

# --- Relatorios e Notificacoes ---
# Define se o aviso de relatorio de baus (vfcb) vem ativado por padrao
default-chest-debug-enabled: true

# Notificacoes de Venda (AutoSell) na Action Bar
default-actionbar-enabled: true

# --- Integracoes Externas ---
# Se o plugin deve aguardar drops de outros plugins (como mcMMO)
# Recomendado manter em 'true' para garantir bonus de mineracao/escavacao.
wait-for-extra-drops: true

# Configuracoes do ShopGUI+
shopgui-integration:
  enabled: true
  fallback-price: 0.1
